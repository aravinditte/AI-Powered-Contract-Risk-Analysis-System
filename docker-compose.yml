version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: contracts
      POSTGRES_USER: contracts_user
      POSTGRES_PASSWORD: contracts_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: deployment/docker/backend.Dockerfile
    env_file:
      - .env.example
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: deployment/docker/frontend.Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
